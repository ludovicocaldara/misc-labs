title: "ExaDB-XS to Data Guard PDB Migration Setup"
schemaVersion: 1.1.0
version: "1.0.1"
locale: "en"

variableGroups:
  - title: "Required"
    variables:
      - compartment_ocid
      - availability_domain
      - db_admin_password
  - title: "Region"
    variables:
      - region
  - title: "Networking"
    variables:
      - vcn_cidr
      - backup_subnet_cidr
      - public_subnet_cidr
  - title: "Vault Capacity"
    variables:
      - vault_highcap_size_gb
  - title: "Cluster Settings"
    variables:
      - ssh_public_key
      - gi_version
      - grid_image_id
      - enabled_ecpu_per_node
      - total_ecpu_per_node
      - vmfs_size_gb_per_node
  - title: "Database Settings"
    variables:
      - db_version
      - db_name
      - db2_name
      - db4_name
      - pdb_name
  - title: "Data Guard"
    variables:
      - enable_active_data_guard
  - title: "Timing / Backoff"
    variables:
      - post_cluster_wait_seconds
      - between_dbhomes_wait_seconds
      - pre_database_wait_seconds

variables:
  region:
    type: string
    title: "Region"
    description: "OCI region"
    default: "us-phoenix-1"
    required: true

  compartment_ocid:
    type: string
    title: "Compartment OCID"
    description: "Target compartment for all resources"
    required: true

  availability_domain:
    type: string
    title: "Availability Domain"
    description: "Use your tenancy Availability Domain Eg:AAef:PHX-AD-1"
    required: true

  grid_image_id:
    type: string
    title: "Grid Image OCID Override (DB Patch OCID)"
    description: >
      Optional ExaDB-XS Grid Infrastructure image OCID override. Expected value
      is an OCI Database Patch OCID for a Grid Infrastructure image, for example
      ocid1.dbpatch.oc1.<region>.<unique_id>. Leave empty for the normal path:
      Terraform discovers a valid provisioning-capable image from GI Version,
      Region, Availability Domain, Compartment OCID, and shape family EXADB_XS.
      Set this only to pin a known-good GI image. The OCID must match the
      selected Region and Availability Domain.
    required: false

  gi_version:
    type: string
    title: "Grid Infrastructure Version"
    description: >
      Grid Infrastructure major version used for dynamic ExaDB-XS image lookup.
      Expected value is a GI major version such as 23.0.0.0. Terraform asks OCI
      for compatible provisioning-capable minor versions for EXADB_XS and
      selects the first returned entry that includes a grid_image_id.
    default: "23.0.0.0"
    required: false

  db_admin_password:
    type: string
    title: "DB Admin Password"
    description: ">=12 chars with upper/lower/digit/special"
    sensitive: true
    required: true

  vcn_cidr:
    type: string
    title: "VCN CIDR"
    default: "10.40.0.0/16"
    required: false

  backup_subnet_cidr:
    type: string
    title: "Backup Subnet CIDR (private)"
    default: "10.40.2.0/24"
    required: false

  public_subnet_cidr:
    type: string
    title: "Public Subnet CIDR (used by both VM Clusters)"
    default: "10.40.10.0/24"
    required: false

  vault_highcap_size_gb:
    type: number
    title: "Vault High Capacity Size (GiB)"
    default: 500
    required: false

  ssh_public_key:
    type: string
    title: "SSH Public Key"
    description: "OpenSSH public key for cluster nodes (required)"
    required: true

  enabled_ecpu_per_node:
    type: number
    title: "Enabled ECPUs per node"
    default: 8
    required: false

  total_ecpu_per_node:
    type: number
    title: "Total ECPUs per node (cap)"
    default: 8
    required: false

  vmfs_size_gb_per_node:
    type: number
    title: "VM FS size per node (GiB)"
    default: 250
    required: false

  db_version:
    type: string
    title: "Database Version"
    description: "e.g., 23.26.2.0.0"
    default: "23.26.2.0.0"
    required: false

  db_name:
    type: string
    title: "RAC DB 1 CDB Name"
    description: "Primary database in the Data Guard group on Cluster A"
    default: "racdb1"
    required: false

  db2_name:
    type: string
    title: "RAC DB 2 CDB Name"
    description: "Independent database on Cluster A"
    default: "racdb2"
    required: false

  db4_name:
    type: string
    title: "RAC DB 4 CDB Name"
    description: "Independent database on Cluster B"
    default: "racdb4"
    required: false

  pdb_name:
    type: string
    title: "PDB Name"
    default: "mypdb"
    required: false

  enable_active_data_guard:
    type: boolean
    title: "Enable Active Data Guard"
    description: "Enable read-only standby"
    default: true
    required: false

  post_cluster_wait_seconds:
    type: number
    title: "Wait after Clusters (seconds)"
    description: "Buffer before DB Homes (set 900-1800 if clusters just finished)"
    default: 900
    required: false

  between_dbhomes_wait_seconds:
    type: number
    title: "Gap between DB Homes (seconds)"
    description: "Buffer between serialized DB Home creates"
    default: 300
    required: false

  pre_database_wait_seconds:
    type: number
    title: "Pre-Database Wait (seconds)"
    description: "Buffer after DB Homes before creating databases"
    default: 120
    required: false
