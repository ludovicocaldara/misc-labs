version: 1
description: Landing Zone input schema highlighting the few required values for a quick start.

groups:
  - name: Core OCI Authentication
    description: Credentials required to authenticate against OCI.
    required: true
    variables:
      - name: tenancy_ocid
        type: string
        required: true
        description: OCID of the tenancy that hosts the landing zone resources.
      - name: user_ocid
        type: string
        required: true
        description: OCID of the IAM user that Terraform will use.
      - name: fingerprint
        type: string
        required: true
        description: API key fingerprint associated with the IAM user.
      - name: private_key_path
        type: string
        required: true
        description: Path to the private key matching the provided fingerprint.
      - name: region
        type: string
        required: true
        default: eu-frankfurt-1
        description: Default region for resource creation.

  - name: Target Compartment
    description: Where resources will be provisioned.
    required: true
    variables:
      - name: compartment_ocid
        type: string
        required: true
        description: OCID of the compartment hosting landing zone resources.

  - name: Quick Start Defaults
    description: Optional values that normally work out of the box.
    required: false
    show_by_default: false
    variables:
      - name: name_prefix
        type: string
        default: lab-lz
        description: Prefix added to resource names.
      - name: vcn_cidr
        type: string
        default: 10.50.0.0/16
        description: CIDR block for the landing zone VCN.
      - name: bastion_subnet_cidr
        type: string
        default: 10.50.1.0/24
        description: CIDR block for the Bastion subnet.
      - name: enable_nat_gateway
        type: bool
        default: true
        description: Provision a NAT gateway for private subnets.
      - name: enable_service_gateway
        type: bool
        default: true
        description: Provision a Service Gateway for private access to OCI services.
      - name: client_cidr_block_allow_list
        type: list(string)
        default:
          - 203.0.113.0/24
        description: Public CIDRs allowed to initiate Bastion sessions.
      - name: defined_tags
        type: map(string)
        default: {}
        description: Optional defined tags applied to resources.
      - name: freeform_tags
        type: map(string)
        default:
          environment: dev
        description: Optional freeform tags applied to resources.